<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TACO Benchmark</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f4;
        color: #18201d;
      }
      main {
        max-width: 820px;
        margin: 0 auto;
        padding: 42px 22px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 34px;
      }
      p {
        color: #4d5a53;
        line-height: 1.6;
      }
      a {
        color: #1d3f34;
        font-weight: 700;
      }
      pre {
        overflow: auto;
        background: #17201c;
        color: #edf6ef;
        border-radius: 8px;
        padding: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TACO Benchmark</h1>
      <p>The benchmark is packaged with TACO in the repository under <code>benchmark/</code>.</p>
      <p>
        Browse the data on GitHub:
        <a href="https://github.com/wengshihao/TACO/tree/main/benchmark">TACO/benchmark</a>
      </p>
      <pre>taco run --input benchmark/TACO-Judge/chatgpt4o.jsonl --output outputs/result.jsonl --question-field question --answer-field llmanswer --resume</pre>
    </main>
  </body>
</html>
